name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read versions from gradle.properties
        id: versions
        run: |
          mod_version=$(grep -E '^mod_version=' gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')
          minecraft_version=$(grep -E '^minecraft_version=' gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')
          if [[ -z "${mod_version}" ]]; then
            echo "ERROR: mod_version not found in gradle.properties" >&2
            exit 1
          fi
          if [[ -z "${minecraft_version}" ]]; then
            echo "ERROR: minecraft_version not found in gradle.properties" >&2
            exit 1
          fi
          echo "mod_version=${mod_version}" >> "$GITHUB_OUTPUT"
          echo "minecraft_version=${minecraft_version}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: ./gradlew build

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.versions.outputs.mod_version }}
          name: Press2Hold ${{ steps.versions.outputs.minecraft_version }}-v${{ steps.versions.outputs.mod_version }}
          generate_release_notes: true
          files: build/libs/!(*-sources).jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
