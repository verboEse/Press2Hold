name: Create Release on PR Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read versions from gradle.properties
        id: versions
        run: |
          mod_version=$(grep -E '^mod_version=' gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')
          minecraft_version=$(grep -E '^minecraft_version=' gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')
          if [[ -z "${mod_version}" ]]; then
            echo "ERROR: mod_version not found in gradle.properties" >&2
            exit 1
          fi
          if [[ -z "${minecraft_version}" ]]; then
            echo "ERROR: minecraft_version not found in gradle.properties" >&2
            exit 1
          fi
          echo "mod_version=${mod_version}" >> "$GITHUB_OUTPUT"
          echo "minecraft_version=${minecraft_version}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build with Gradle
        run: ./gradlew build

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ steps.versions.outputs.mod_version }}"
          if gh release view "${tag}" &>/dev/null; then
            echo "Release ${tag} already exists, skipping."
            exit 0
          fi
          mapfile -t jars < <(find build/libs -name '*.jar' ! -name '*-sources.jar' ! -name '*-dev.jar' ! -name '*-dev-sources.jar')
          if [[ ${#jars[@]} -eq 0 ]]; then
            echo "ERROR: No JAR files found in build/libs — build may have failed." >&2
            exit 1
          fi
          echo "Attaching ${#jars[@]} artifact(s) to release ${tag}:"
          printf '  %s\n' "${jars[@]}"
          gh release create "${tag}" \
            --title "Press2Hold ${{ steps.versions.outputs.minecraft_version }}-${tag}" \
            --generate-notes \
            "${jars[@]}"
